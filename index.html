<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PatternFly 6 Finder Extension</title>

    <!-- PatternFly 6 base CSS -->
    <link
      rel="stylesheet"
      href="/node_modules/@patternfly/patternfly/patternfly.min.css"
    />

    <!-- Font Awesome 6 (CDN) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Finder component CSS -->
    <link rel="stylesheet" href="/src/finder.css" />

    <style>
      body {
        font-family: var(--pf-t--global--font--family--100),sans-serif;
        background-color: var(--pf-t--global--background--color--secondary--default);
        margin: 0;
        padding: var(--pf-t--global--spacer--400);
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
      }

      .demo-header {
        margin-bottom: var(--pf-t--global--spacer--400);
      }

      .demo-header h1 {
        font-family: var(--pf-t--global--font--family--200),sans-serif;
        font-size: var(--pf-t--global--font--size--700);
        font-weight: var(--pf-t--global--font--weight--200);
        color: var(--pf-t--global--text--color--100);
        margin: 0 0 var(--pf-t--global--spacer--100) 0;
      }

      .demo-header p {
        font-size: var(--pf-t--global--font--size--200);
        color: var(--pf-t--global--text--color--200);
        margin: 0;
      }

      #finder-demo {
        flex: 1;
        min-height: 0;
      }

      #finder-demo .pf-v6-c-finder {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>Finder Extension</h1>
      <p>
        A macOS Finder-style column browser component for PatternFly 6.
        Click folders to navigate, click any item to see its preview.
      </p>
    </div>

    <div id="finder-demo"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
